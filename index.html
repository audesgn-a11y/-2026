<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Приглашение: Рауль и Александра</title>

<style>
:root {
    --velvet-green-base: #0a2e1f;
    --velvet-gradient: radial-gradient(circle at center, #164a36 0%, #0a2e1f 100%);
    --gold-color: #d4af37;
    --gold-text: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    --card-white: #ffffff;
}

body, html {
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #e8e8e8;
    font-family: 'Playfair Display', serif;
    overflow: hidden;
}

/* КОНВЕРТ */
.envelope-wrapper {
    position: relative;
    width: 320px;
    height: 230px;
    background: var(--velvet-gradient);
    border-radius: 4px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    cursor: pointer;
    perspective: 2000px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
}

.envelope-flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--velvet-gradient);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transition: transform 0.8s;
    transform-origin: top;
    z-index: 3;
}

.wax-seal {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 55px;
    height: 55px;
    background: radial-gradient(circle, #fcf6ba, #d4af37);
    border-radius: 50%;
    z-index: 4;
    transition: opacity 0.4s;
}

/* КАРТОЧКА */
.letter {
    position: absolute;
    bottom: 5px;
    width: 300px;
    height: 380px;
    background: white;
    padding: 25px 15px;
    box-sizing: border-box;
    opacity: 0;
    transform: translateY(0);
    transition: 0.9s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.letter h1 {
    font-size: 20px;
    background: var(--gold-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
}

.letter p {
    text-align: center;
    font-size: 14px;
}

/* КНОПКА WOW */
.location-btn {
    background: linear-gradient(145deg, #0a2e1f, #164a36);
    color: #fff;
    padding: 12px 0;
    width: 100%;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid #d4af37;
    display: block;
    text-align: center;
    margin-top: 12px;
    border-radius: 3px;

    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

.envelope-wrapper.open .location-btn {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.4s;
    box-shadow: 0 0 12px rgba(212,175,55,0.5);
}

.location-btn:hover {
    transform: translateY(-2px) scale(1.03);
    background: linear-gradient(145deg, #d4af37, #f5e6a6);
    color: #000;
    box-shadow: 0 0 20px rgba(212,175,55,0.8);
}

/* блик */
.location-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
    transition: 0.6s;
}

.location-btn:hover::before {
    left: 100%;
}

/* ОТКРЫТИЕ */
.envelope-wrapper.open .envelope-flap {
    transform: rotateX(180deg);
}

.envelope-wrapper.open .wax-seal {
    opacity: 0;
}

.envelope-wrapper.open .letter {
    transform: translateY(-160px);
    opacity: 1;
}

/* подпись */
.instruction {
    position: absolute;
    bottom: -40px;
    width: 100%;
    text-align: center;
    font-size: 10px;
}
</style>
</head>

<body>

<div class="envelope-wrapper" onclick="toggleInvite(this)">
    <div class="envelope-flap">
        <div class="wax-seal"></div>
    </div>

    <div class="letter">
        <div>
            <p style="font-style: italic; color: #888;">Рауль и Александра</p>
            <h1>Приглашают Вас</h1>
            <p>на торжество по случаю нашей свадьбы</p>
        </div>

        <div style="border-top:1px solid #d4af37;border-bottom:1px solid #d4af37;padding:10px 0;">
            <p style="font-weight:bold;color:#b38728;">27 МАРТА | 14:00</p>
            <p>Кафе Ботанического сада</p>

            <a href="https://maps.app.goo.gl/6oSBdpnAvEbbkUbU6?g_st=it"
               class="location-btn"
               target="_blank"
               onclick="event.stopPropagation()">
               Открыть локацию
            </a>
        </div>
    </div>

    <div class="instruction">Нажмите на конверт</div>
</div>

<!-- звук -->
<audio id="openSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c08a1b.mp3?filename=paper-unwrap-102474.mp3"></audio>

<script>
function toggleInvite(el) {
    el.classList.toggle('open');

    const sound = document.getElementById('openSound');
    if (el.classList.contains('open')) {
        sound.currentTime = 0;
        sound.play();
    }
}
</script>

</body>
</html>
