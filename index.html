<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение: Рауль и Александра</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --velvet-green: #0a2e1f;
            --gold-gradient: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        body, html {
            height: 100%; margin: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #d1d1d1;
            font-family: 'Playfair Display', serif;
        }

        .main-container {
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            perspective: 1000px;
        }

        .main-container.open-state {
            transform: translateY(120px); /* Немного уменьшил сдвиг для баланса */
        }

        /* КОНВЕРТ */
        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--velvet-green);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 20;
            /* overflow: hidden;  <-- УДАЛЕНО, чтобы письмо было видно снаружи */
        }

        /* ПИСЬМО */
        .letter {
            position: absolute;
            top: 5px; /* ИСПРАВЛЕНО: начальное положение чуть ниже края */
            left: 10px; right: 10px;
            height: 210px; 
            background: #ffffff;
            padding: 20px 15px;
            box-sizing: border-box;
            text-align: center;
            display: flex; flex-direction: column; justify-content: space-between;
            
            z-index: 15; /* ИСПРАВЛЕНО: изначально под передней стенкой (30) */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1), z-index 0s 0.3s;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* ПЕРЕДНЯЯ СТЕНКА */
        .envelope-front {
            position: absolute;
            inset: 0;
            background: var(--velvet-green);
            /* Вырез, чтобы видеть письмо внутри */
            clip-path: polygon(0% 0%, 50% 50%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 30; 
            border-radius: 0 0 8px 8px;
        }

        /* КЛАПАН */
        .envelope-flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d3826;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 40;
        }

        .wax-seal {
            position: absolute;
            bottom: 15%; left: 50%;
            transform: translateX(-50%);
            width: 65px; height: 65px;
            background: radial-gradient(circle, #fcf6ba 0%, #d4af37 100%);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s;
        }

        /* СОСТОЯНИЕ ОТКРЫТО */
        .main-container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 5; /* Уходит назад */
        }

        .main-container.open .letter {
            transform: translateY(-110%); /* ИСПРАВЛЕНО: вылетает наверх */
            z-index: 50; /* ИСПРАВЛЕНО: теперь письмо выше всех элементов конверта */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2), z-index 0s 0.2s;
        }

        .main-container.open .wax-seal {
            opacity: 0;
            pointer-events: none;
        }

        /* ОСТАЛЬНЫЕ СТИЛИ */
        .letter h1 {
            font-size: 18px; margin: 5px 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .event-block {
            border-top: 1px solid #d4af37; border-bottom: 1px solid #d4af37;
            padding: 8px 0; margin: 5px 0;
        }

        .location-btn {
            background: var(--velvet-green); color: #fff;
            padding: 10px; text-decoration: none; font-size: 10px;
            text-transform: uppercase; border: 1px solid #d4af37; border-radius: 2px;
            display: inline-block;
        }
        
        .instruction {
            margin-top: 40px; font-size: 14px; color: #555; font-style: italic;
        }
    </style>
</head>
<body>

    <div id="mainWrapper" class="main-container">
        <div class="envelope" onclick="openEnvelope()">
            
            <div class="envelope-flap">
                <div class="wax-seal"></div>
            </div>

            <div class="letter">
                <div>
                    <p style="margin:0; font-style:italic; color:#777; font-size:12px;">Рауль и Александра</p>
                    <h1>Приглашают Вас</h1>
                    <p style="font-size:13px; margin-top: 5px;">на ланч по случаю свадьбы</p>
                </div>
                <div class="event-block">
                    <span style="color:#b38728; font-weight:bold; font-size:15px;">27 МАРТА | 14:00</span>
                    <p style="margin:3px 0 0; font-size:13px; color: #333;">Кафе Ботанического сада</p>
                </div>
                <a href="#" 
                   class="location-btn" 
                   target="_blank" 
                   onclick="event.stopPropagation()">
                    Открыть локацию
                </a>
            </div>

            <div class="envelope-front"></div>
        </div>
    </div>

    <div class="instruction">Нажмите на конверт</div>

<script>
    function openEnvelope() {
        const el = document.getElementById('mainWrapper');
        el.classList.toggle('open');
        el.classList.toggle('open-state');
    }
</script>

</body>
</html>
