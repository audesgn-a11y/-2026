<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Приглашение: Рауль и Александра</title>

<style>
:root {
    --velvet-green-base: #0a2e1f;
    --velvet-gradient: radial-gradient(circle at center, #164a36 0%, #0a2e1f 100%);
    --gold-color: #d4af37;
    --gold-text: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    --card-white: #ffffff;

    --velvet-texture: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.3"/></svg>');
    --paper-texture: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="p"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5"/></filter><rect width="100" height="100" filter="url(%23p)" opacity="0.05"/></svg>');
}

body, html {
    height: 100%;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #e8e8e8;
    font-family: 'Playfair Display', serif;
    overflow: hidden;
}

/* КОНВЕРТ */
.envelope-wrapper {
    position: relative;
    width: 320px;
    height: 230px;
    background: var(--velvet-gradient);
    border-radius: 4px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    cursor: pointer;
    perspective: 2000px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
}

.envelope-flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--velvet-gradient);
    background-image: var(--velvet-texture);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transition: transform 0.8s;
    transform-origin: top;
    z-index: 30;
}

.wax-seal {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 55px;
    height: 55px;
    background: radial-gradient(circle, #fcf6ba 0%, #d4af37 100%);
    border-radius: 50%;
    z-index: 40;
    display: flex;
    justify-content: center;
    align-items: center;
}

.wax-seal::after {
    content: '';
    width: 30px;
    height: 30px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="%238a6d1d" stroke-width="2.5"><circle cx="24" cy="32" r="14"/><circle cx="40" cy="32" r="14"/></svg>');
    background-size: contain;
    background-repeat: no-repeat;
}

/* КАРТОЧКА */
.letter {
    position: absolute;
    bottom: 5px;
    width: 300px;
    height: 380px;
    background-color: var(--card-white);
    background-image: var(--paper-texture);
    padding: 25px 15px;
    box-sizing: border-box;
    border-radius: 2px;
    opacity: 0;
    transform: translateY(0);
    transition: transform 0.9s ease, opacity 0.5s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.letter h1 {
    font-size: 20px;
    background: var(--gold-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
}

.letter p {
    text-align: center;
    font-size: 14px;
}

/* БЛОК ДАТЫ */
.event-block {
    border-top: 1px solid #d4af37;
    border-bottom: 1px solid #d4af37;
    padding: 14px 0 10px 0;
    margin-top: -5px;
}

.event-date {
    font-weight: bold;
    color: #b38728;
    font-size: 16px;
    margin: 0 0 4px 0;
}

.event-place {
    margin: 0;
    font-size: 14px;
}

/* WOW-КНОПКА */
.location-btn {
    background: linear-gradient(145deg, #0a2e1f, #164a36);
    color: white;
    padding: 10px 0;
    width: 100%;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--gold-color);
    margin-top: 12px;

    display: block;
    text-align: center;
    border-radius: 3px;
    position: relative;
    overflow: hidden;

    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
}

.envelope-wrapper.open .location-btn {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.4s;
    box-shadow: 0 0 12px rgba(212,175,55,0.4);
}

.location-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(145deg, #d4af37, #f5e6a6);
    color: #000;
    box-shadow: 0 0 18px rgba(212,175,55,0.7);
}

.location-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transition: 0.6s;
}

.location-btn:hover::before {
    left: 100%;
}

/* АНИМАЦИЯ */
.envelope-wrapper.open .envelope-flap {
    transform: rotateX(180deg);
    z-index: 5;
}

.envelope-wrapper.open .wax-seal {
    opacity: 0;
}

.envelope-wrapper.open .letter {
    transform: translateY(-160px);
    opacity: 1;
}

.instruction {
    position: absolute;
    bottom: -40px;
    width: 100%;
    text-align: center;
    font-size: 10px;
}
</style>
</head>

<body>

<div class="envelope-wrapper" onclick="this.classList.toggle('open')">

    <div class="envelope-flap">
        <div class="wax-seal"></div>
    </div>

    <div class="letter">
        <div>
            <p style="font-style: italic; color: #888;">Рауль и Александра</p>
            <h1>Приглашают Вас</h1>
            <p>на торжество по случаю нашей свадьбы</p>
        </div>

        <div class="event-block">
            <p class="event-date">27 МАРТА | 14:00</p>
            <p class="event-place">Кафе Ботанического сада</p>

            <a href="https://maps.app.goo.gl/6oSBdpnAvEbbkUbU6?g_st=it"
               class="location-btn"
               target="_blank"
               onclick="event.stopPropagation()">
               Открыть локацию
            </a>
        </div>
    </div>

    <div class="instruction">Нажмите на конверт</div>
</div>

</body>
</html>
