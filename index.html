<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение: Рауль и Александра</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --velvet-green: #0a2e1f;
            --dark-green: #051a12;
            --gold-gradient: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        body, html {
            height: 100%; margin: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #d1d1d1;
            font-family: 'Playfair Display', serif;
        }

        .main-container {
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            perspective: 1000px;
        }

        /* Опускаем конверт вниз при открытии, чтобы письмо не ушло за экран телефона */
        .main-container.open-state {
            transform: translateY(150px);
        }

        /* ОСНОВНОЙ КОРПУС КОНВЕРТА */
        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--velvet-green);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            cursor: pointer;
            z-index: 10;
        }

        /* Внутреннее пространство, где прячется письмо */
        .letter-container {
            position: absolute;
            inset: 0;
            overflow: hidden; /* КРИТИЧНО: полностью скрывает письмо вне границ */
            z-index: 5;
            border-radius: 0 0 8px 8px;
        }

        /* КАРТОЧКА ПИСЬМА */
        .letter {
            position: absolute;
            top: 10px; /* Изначально внутри */
            left: 15px;
            right: 15px;
            height: 280px;
            background: #ffffff;
            padding: 25px 20px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            transition: transform 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transform: translateY(220px); /* Полностью утоплено вниз */
        }

        /* ПЕРЕДНИЙ КЛАПАН (КАРМАН) С РЕЛЬЕФОМ */
        .envelope-front {
            position: absolute;
            inset: 0;
            background: var(--velvet-green);
            clip-path: polygon(0% 0%, 50% 50%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 15;
            box-shadow: inset 0 30px 40px rgba(0,0,0,0.5);
            border-radius: 0 0 8px 8px;
        }

        /* ВЕРХНЯЯ КРЫШКА */
        .envelope-flap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0e3d2a;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            transition: transform 0.7s ease-in-out;
            z-index: 25;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* СУРГУЧНАЯ ПЕЧАТЬ */
        .wax-seal {
            position: absolute;
            bottom: 15%; left: 50%;
            transform: translateX(-50%);
            width: 65px; height: 65px;
            background: radial-gradient(circle, #fcf6ba 0%, #d4af37 100%);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.3);
            transition: opacity 0.4s ease;
        }

        .wax-seal::after {
            content: '';
            width: 35px; height: 35px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="rgba(138,109,29,0.8)" stroke-width="3"><circle cx="24" cy="32" r="12"/><circle cx="40" cy="32" r="12"/></svg>');
            background-size: contain; background-repeat: no-repeat;
        }

        /* ТЕКСТ ПИСЬМА */
        .letter h1 {
            font-size: 20px; margin: 5px 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .event-block {
            border-top: 1px solid #d4af37; border-bottom: 1px solid #d4af37;
            padding: 12px 0; margin: 10px 0;
        }
        .location-btn {
            background: var(--velvet-green); color: #fff;
            padding: 10px; text-decoration: none; font-size: 11px;
            text-transform: uppercase; border: 1px solid #d4af37; border-radius: 2px;
            transition: background 0.3s;
        }
        .location-btn:hover { background: #164a36; }

        /* АНИМАЦИЯ ОТКРЫТИЯ */
        .main-container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1; /* Уходит под письмо */
        }
        .main-container.open .letter {
            transform: translateY(-200px); /* Красиво выезжает вверх */
        }
        .main-container.open .wax-seal {
            opacity: 0; pointer-events: none;
        }

        .instruction {
            position: absolute; bottom: -60px; width: 100%;
            text-align: center; font-size: 13px; color: #555; font-style: italic;
        }
    </style>
</head>
<body>

<div id="mainWrapper" class="main-container">
    <div class="envelope" onclick="openEnvelope()">
        
        <div class="envelope-flap">
            <div class="wax-seal"></div>
        </div>

        <div class="letter-container">
            <div class="letter">
                <div>
                    <p style="margin:0; font-style:italic; color:#777; font-size:14px;">Рауль и Александра</p>
                    <h1>Приглашают Вас</h1>
                    <p style="font-size:14px; margin-top: 10px;">на ланч по случаю свадьбы</p>
                </div>
                <div class="event-block">
                    <span style="color:#b38728; font-weight:bold; font-size:16px;">27 МАРТА | 14:00</span>
                    <p style="margin:5px 0 0; font-size:14px; color: #333;">Кафе Ботанического сада</p>
                </div>
                <a href="https://maps.app.goo.gl/6oSBdpnAvEbbkUbU6?g_st=it" 
                   class="location-btn" 
                   target="_blank" 
                   onclick="event.stopPropagation()">
                    Открыть локацию
                </a>
            </div>
        </div>

        <div class="envelope-front"></div>

        <div class="instruction">Нажмите на конверт</div>
    </div>
</div>

<script>
    function openEnvelope() {
        document.getElementById('mainWrapper').classList.toggle('open');
        document.getElementById('mainWrapper').classList.toggle('open-state');
    }
</script>

</body>
</html>
