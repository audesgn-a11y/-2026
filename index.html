<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение: Рауль и Александра</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --velvet-green: #0a2e1f;
            --dark-green: #061f15;
            --light-green: #11402b;
            --gold-text: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        body, html {
            height: 100%; margin: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #d1d1d1;
            font-family: 'Playfair Display', serif;
        }

        .main-container {
            position: relative;
            transition: transform 0.8s ease-in-out;
            perspective: 1000px;
        }

        /* Опускаем всю конструкцию при открытии, чтобы письмо влезло в экран */
        .main-container.shifted {
            transform: translateY(140px);
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--velvet-green);
            border-radius: 0 0 5px 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            cursor: pointer;
            transform-style: preserve-3d;
        }

        /* ЗАДНЯЯ СТЕНКА */
        .envelope-back {
            position: absolute;
            inset: 0;
            background: var(--dark-green);
            border-radius: 0 0 5px 5px;
            z-index: 1;
        }

        /* ПИСЬМО (Изначально спрятано в ноль) */
        .letter {
            position: absolute;
            bottom: 5px; left: 15px; right: 15px;
            height: 280px;
            background: #fff;
            padding: 25px 20px;
            box-sizing: border-box;
            z-index: 2; /* Между задней и передней стенкой */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transform: translateY(0); /* Спрятано за передней панелью */
        }

        /* ПЕРЕДНЯЯ ПАНЕЛЬ (РЕЛЬЕФНЫЙ КАРМАН) */
        .envelope-front {
            position: absolute;
            inset: 0;
            background: var(--velvet-green);
            /* Создаем имитацию склейки конверта градиентом и тенями */
            clip-path: polygon(0% 0%, 50% 50%, 100% 0%, 100% 100%, 0% 100%);
            z-index: 10;
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.3);
            border-radius: 0 0 5px 5px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* ВЕРХНИЙ КЛАПАН */
        .envelope-flap {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            background: var(--light-green);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transition: transform 0.6s ease;
            transform-origin: top;
            z-index: 20;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        /* СУРГУЧ */
        .wax-seal {
            position: absolute;
            bottom: 15%; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 60px;
            background: radial-gradient(circle, #fcf6ba 0%, #d4af37 100%);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 5px rgba(0,0,0,0.2);
            transition: opacity 0.3s;
        }

        .wax-seal::after {
            content: '';
            width: 35px; height: 35px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="rgba(138,109,29,0.8)" stroke-width="3"><circle cx="24" cy="32" r="12"/><circle cx="40" cy="32" r="12"/></svg>');
            background-size: contain; background-repeat: no-repeat;
        }

        /* ТЕКСТ В ПИСЬМЕ */
        .letter h1 {
            font-size: 20px; margin: 5px 0;
            background: var(--gold-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .event-block {
            border-top: 1px solid #d4af37; border-bottom: 1px solid #d4af37;
            padding: 12px 0; margin: 10px 0;
        }
        .location-btn {
            background: var(--velvet-green); color: #fff;
            padding: 10px; text-decoration: none; font-size: 11px;
            text-transform: uppercase; border: 1px solid #d4af37; border-radius: 2px;
        }

        /* СОСТОЯНИЯ ПРИ ОТКРЫТИИ */
        .open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 0;
        }
        .open .letter {
            transform: translateY(-180px); /* Письмо выезжает */
        }
        .open .wax-seal {
            opacity: 0;
            pointer-events: none;
        }

        .instruction {
            position: absolute; bottom: -50px; width: 100%;
            text-align: center; font-size: 12px; color: #444; font-style: italic;
        }
    </style>
</head>
<body>

<div id="mainWrap" class="main-container">
    <div class="envelope-wrapper" onclick="toggleEnvelope()">
        
        <div class="envelope-back"></div>

        <div class="letter">
            <div>
                <p style="margin:0; font-style:italic; color:#777; font-size:14px;">Рауль и Александра</p>
                <h1>Приглашают Вас</h1>
                <p style="font-size:14px; margin-top: 10px;">на ланч по случаю свадьбы</p>
            </div>
            <div class="event-block">
                <span style="color:#b38728; font-weight:bold; font-size:16px;">27 МАРТА | 14:00</span>
                <p style="margin:5px 0 0; font-size:14px; color: #333;">Кафе Ботанического сада</p>
            </div>
            <a href="https://maps.google.com" class="location-btn" target="_blank" onclick="event.stopPropagation()">
                Открыть локацию
            </a>
        </div>

        <div class="envelope-front"></div>

        <div class="envelope-flap">
            <div class="wax-seal"></div>
        </div>

        <div class="instruction">Нажмите на конверт</div>
    </div>
</div>

<script>
    function toggleEnvelope() {
        const wrap = document.querySelector('.envelope-wrapper');
        const main = document.getElementById('mainWrap');
        wrap.classList.toggle('open');
        main.classList.toggle('shifted');
    }
</script>

</body>
</html>
